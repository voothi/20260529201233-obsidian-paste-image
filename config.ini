[Obsidian]
# -----------------------------------------------------------------------
# FALLBACK CONFIGURATION
# These values are used only when the script cannot determine where to
# save the image from the active editor context.
#
# Resolution priority:
#   1. --active-file <path>   Direct path to the open .md file (from AHK)
#   2. --title <window>       Window title; script scans vault for filename
#   3. --workspace <token>    ZID-prefixed workspace name (e.g. 20260308110646-kardenwort-mpv);
#                             script strips the ZID and resolves <vault_base>/<project>/assets
#   4. default_project below  Used when none of the above can be determined
# -----------------------------------------------------------------------

# Root directory that contains all your Obsidian vaults / projects.
vault_base = U:\voothi.vault

# Vault project name to use as a last-resort fallback.
default_project = default

# Automatically create the vault project folder in vault_base if it doesn't exist,
# instead of falling back to default_project.
auto_create_project = true

# Name of the subfolder inside each vault project where images are stored.
assets_folder = assets

# The naming template for saved image files.
# Supported variables:
#   {name}  - The descriptive slug/name (e.g. pasted-image)
#   All standard strftime formats, e.g. %Y (Year), %m (Month), %d (Day), %H (Hour), %M (Minute), %S (Second)
# Example value `%Y%m%d%H%M%S-{name}` produces `20260529215137-pasted-image.png`.
name_template = %Y%m%d%H%M%S-{name}

# Tooltip display duration in milliseconds (e.g. 4000 for 4 seconds).
# If empty or 0, tooltips are disabled completely.
tooltip = 2000

# Optional AHK behavior toggle (used by obsidian-paste-image.ahk):
# When true, the hotkey actively opens editor command palette and runs "Copy Path".
# Default false keeps the hotkey non-intrusive and avoids editor command injection.
editor_copy_path_probe = false

# Whether the AHK launcher should auto-paste the generated wikilink
# back into the active editor after processing.
# true = paste enabled (default for paste-image workflow)
auto_paste_wikilinks = true
